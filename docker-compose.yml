# Production compose — the VPS only pulls this image (never builds).
services:
  web:
    image: ghcr.io/tncp06/tncp.web.id-web:latest
    restart: unless-stopped
    # Host 3100 (3000 is taken by another project); container still listens on 3000.
    # Cloudflare Tunnel points tncp.web.id -> localhost:3100.
    ports:
      - "127.0.0.1:3100:3000"
    env_file: .env
    # Bind mount (not a named volume): host ./data is owned by uid 1000
    # (ec2-user), which matches the container's `node` user, so writes to
    # /data (SQLite + media) work. Also makes backups a plain dir read.
    volumes:
      - ./data:/data
    mem_limit: 512m
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      com.tncp.project: "tncp.web.id"
