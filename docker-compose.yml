# Production compose — the VPS only pulls this image (never builds).
services:
  web:
    image: ghcr.io/tncp06/tncp.web.id-web:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    volumes:
      - app-data:/data
    mem_limit: 512m
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      com.tncp.project: "tncp.web.id"

volumes:
  app-data:
