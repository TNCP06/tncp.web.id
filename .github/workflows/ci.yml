name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # Apply migrations once before the build; next build's parallel workers
      # otherwise race prodMigrations on the same SQLite file (SQLITE_BUSY).
      - run: pnpm --filter web payload migrate
        env:
          PAYLOAD_SECRET: ci-placeholder
          DATABASE_URI: file:/tmp/ci.db
      - run: pnpm build
        env:
          PAYLOAD_SECRET: ci-placeholder
          DATABASE_URI: file:/tmp/ci.db
